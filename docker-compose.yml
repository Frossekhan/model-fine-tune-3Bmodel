version: '3.8'

services:
  ai-assistant:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./chroma_store:/app/chroma_store
      - ./training/examples:/app/training/examples
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - MODEL_BASE=Qwen/Qwen2.5-3B-Instruct
      - LORA_OUTPUT_DIR=./models/lora-qwen3b-amazon-valid
      - CHROMA_PERSIST_DIR=./chroma_store
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - SENTIMENT_MODEL_PATH=./models/sentiment/naive_bayes.json
      - SENTIMENT_DATASET_PATH=./training/examples/sentiment_dataset.json
      - MAX_HISTORY=20
      - MAX_TOKENS=1024
      - TEMPERATURE=0.8
      - TOP_P=0.95
      - LOG_LEVEL=INFO
      - ENABLE_STREAMING=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped