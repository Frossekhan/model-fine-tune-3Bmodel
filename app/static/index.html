<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enterprise AI Assistant</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #17202a;
        --muted: #667085;
        --line: #d8dee8;
        --accent: #1a73e8;
        --accent-strong: #1558b0;
        --user: #e8f0fe;
        --assistant: #ffffff;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at top, #ffffff 0, var(--bg) 42%, #edf2fa 100%);
        color: var(--ink);
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
        max-width: 920px;
        margin: 0 auto;
        background: var(--panel);
        border-left: 1px solid var(--line);
        border-right: 1px solid var(--line);
        box-shadow: 0 18px 50px rgba(32, 45, 64, 0.08);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      main {
        overflow-y: auto;
        padding: 22px;
      }

      .messages {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .message {
        display: flex;
        gap: 10px;
        max-width: 82%;
      }

      .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .avatar {
        flex: 0 0 30px;
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: #edf0f5;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .bubble {
        padding: 11px 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--assistant);
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .user .bubble {
        background: var(--user);
        border-color: #c9e6dc;
      }

      .sentiment {
        display: block;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        padding: 16px 22px 20px;
        border-top: 1px solid var(--line);
        background: #fbfcfe;
      }

      .mic {
        min-width: 48px;
        width: 48px;
        padding: 0;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--accent);
        font-size: 19px;
      }

      .mic:hover {
        background: #f0f6ff;
      }

      textarea {
        width: 100%;
        min-height: 48px;
        max-height: 140px;
        resize: vertical;
        padding: 12px 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font: inherit;
        line-height: 1.4;
      }

      textarea:focus {
        outline: 2px solid rgba(26, 115, 232, 0.18);
        border-color: var(--accent);
      }

      button {
        align-self: end;
        height: 48px;
        min-width: 92px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 640px) {
        .shell {
          border: 0;
        }

        header,
        main,
        .composer {
          padding-left: 14px;
          padding-right: 14px;
        }

        .message {
          max-width: 96%;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="brand">
          <div class="mark">AI</div>
          <div>
            <h1>AI Assistant</h1>
            <div class="status" id="status">Ready</div>
          </div>
        </div>
      </header>

      <main id="chat">
        <div class="messages" id="messages">
          <div class="message assistant">
            <div class="avatar">AI</div>
            <div class="bubble">Hi, I am ready. Ask me a question.</div>
          </div>
        </div>
      </main>

      <form class="composer" id="form">
        <textarea id="prompt" placeholder="Type your message..." autocomplete="off"></textarea>
        <button class="mic" id="mic" type="button" title="Speak">🎙</button>
        <button id="send" type="submit">Send</button>
      </form>
    </div>

    <script>
      const form = document.getElementById("form");
      const promptInput = document.getElementById("prompt");
      const messages = document.getElementById("messages");
      const chat = document.getElementById("chat");
      const send = document.getElementById("send");
      const mic = document.getElementById("mic");
      const status = document.getElementById("status");
      const sessionId = `web-${Date.now()}`;
      const history = [];
      const notificationStorageKey = "assistant.notifications.allowed";
      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;

      function addMessage(role, content, className = "") {
        const row = document.createElement("div");
        row.className = `message ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "You" : "AI";

        const bubble = document.createElement("div");
        bubble.className = `bubble ${className}`;
        bubble.textContent = content;

        row.append(avatar, bubble);
        messages.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
        return bubble;
      }

      function addSentimentMeta(bubble, sentiment) {
        if (!sentiment) return;
        const confidence = Math.round((sentiment.confidence || 0) * 100);
        const meta = document.createElement("span");
        meta.className = "sentiment";
        meta.textContent = `Sentiment: ${sentiment.sentiment} (${confidence}%)`;
        bubble.appendChild(meta);
      }

      function speakReply(text) {
        if (!("speechSynthesis" in window) || !text) {
          status.textContent = "Ready";
          return;
        }

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.onstart = () => {
          status.textContent = "Speaking";
        };
        utterance.onend = () => {
          if (!send.disabled) status.textContent = "Ready";
        };
        utterance.onerror = () => {
          if (!send.disabled) status.textContent = "Ready";
        };
        status.textContent = "Speaking";
        window.speechSynthesis.speak(utterance);
      }

      async function ensureNotificationPermission() {
        if (!("Notification" in window)) return false;

        if (Notification.permission === "granted") {
          localStorage.setItem(notificationStorageKey, "true");
          return true;
        }

        if (Notification.permission === "denied") {
          localStorage.removeItem(notificationStorageKey);
          return false;
        }

        const permission = await Notification.requestPermission();
        if (permission === "granted") {
          localStorage.setItem(notificationStorageKey, "true");
          return true;
        }

        return false;
      }

      function showNotification(title, body) {
        if (!("Notification" in window) || Notification.permission !== "granted") return;
        new Notification(title, { body });
      }

      async function askAssistant(prompt, priorHistory) {
        const response = await fetch("/api/v1/infer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sessionId,
            prompt,
            history: priorHistory,
            tools: null,
            use_rag: false,
            stream: false
          })
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `Request failed: ${response.status}`);
        }

        return response.json();
      }

      async function analyzeVoice(blob) {
        const formData = new FormData();
        formData.append("file", blob, "voice.webm");

        const response = await fetch("/api/v1/voice-sentiment", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Voice analysis failed: " + response.status);
        }

        return response.json();
      }

      function addRealtimeContext(bubble, realtimeContext) {
        if (!realtimeContext || !realtimeContext.length) return;
        const container = document.createElement("div");
        container.className = "realtime-context";
        container.style.marginTop = "8px";
        container.style.paddingTop = "8px";
        container.style.borderTop = "1px solid var(--line)";
        container.style.fontSize = "12px";
        container.style.color = "var(--muted)";

        const title = document.createElement("strong");
        title.textContent = "Real-time data:";
        container.appendChild(title);

        realtimeContext.forEach((item) => {
          const source = document.createElement("div");
          source.style.marginTop = "4px";
          source.innerHTML = `<em>${escapeHtml(item.source)}:</em> ${escapeHtml(item.query)}`;
          container.appendChild(source);

          const results = item.results || [];
          results.slice(0, 3).forEach((result) => {
            const line = document.createElement("div");
            line.style.marginLeft = "12px";
            line.style.marginTop = "2px";
            const titleText = result.title || result;
            const href = result.href || result.url || "";
            if (href) {
              const link = document.createElement("a");
              link.href = href;
              link.target = "_blank";
              link.rel = "noopener noreferrer";
              link.textContent = titleText;
              link.style.color = "var(--accent)";
              line.appendChild(link);
            } else {
              line.textContent = titleText;
            }
            container.appendChild(line);
          });
        });

        bubble.appendChild(container);
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      async function submitPrompt(prompt, sentiment = null, realtimeContext = null) {
        const userBubble = addMessage("user", prompt);
        addSentimentMeta(userBubble, sentiment);
        const priorHistory = history.slice();
        history.push({ role: "user", content: prompt });
        promptInput.value = "";
        promptInput.focus();

        const thinking = addMessage("assistant", "Thinking...");
        send.disabled = true;
        mic.disabled = true;
        status.textContent = "Thinking";

        try {
          await ensureNotificationPermission();
          const data = await askAssistant(prompt, priorHistory);
          const reply = data.response || "";
          thinking.textContent = reply;
          if (!sentiment) {
            addSentimentMeta(thinking, data.metadata && data.metadata.sentiment);
          }
          if (realtimeContext && realtimeContext.length) {
            addRealtimeContext(thinking, realtimeContext);
          }
          history.push({ role: "assistant", content: reply });
          speakReply(reply);
          showNotification("AI Assistant", reply);
        } catch (error) {
          thinking.textContent = "Could not get an answer. Check the server logs.";
          thinking.classList.add("error");
          status.textContent = "Error";
          console.error(error);
        } finally {
          send.disabled = false;
          mic.disabled = false;
          chat.scrollTop = chat.scrollHeight;
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const prompt = promptInput.value.trim();
        if (!prompt) return;
        submitPrompt(prompt);
      });

      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });

      async function startRecording() {
        await ensureNotificationPermission();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.addEventListener("dataavailable", (event) => {
          if (event.data.size > 0) audioChunks.push(event.data);
        });
        mediaRecorder.addEventListener("stop", async () => {
          stream.getTracks().forEach((track) => track.stop());
          isRecording = false;
          mic.textContent = "Mic";
          status.textContent = "Analyzing voice";
          send.disabled = true;
          mic.disabled = true;

          try {
            const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
            const voice = await analyzeVoice(audioBlob);
            const transcript = (voice.transcript || "").trim();
            if (!transcript) throw new Error("No speech was detected in the recording.");
            promptInput.value = transcript;
            await submitPrompt(transcript, voice, voice.realtime_context);
          } catch (error) {
            addMessage("assistant", "Could not analyze your voice. Please try again.", "error");
            status.textContent = "Error";
            console.error(error);
          } finally {
            send.disabled = false;
            mic.disabled = false;
            chat.scrollTop = chat.scrollHeight;
          }
        });
        mediaRecorder.start();
        isRecording = true;
        mic.textContent = "Stop";
        status.textContent = "Recording";
      }

      if (navigator.mediaDevices && window.MediaRecorder) {
        mic.addEventListener("click", async () => {
          try {
            if (isRecording && mediaRecorder) {
              mediaRecorder.stop();
            } else {
              await startRecording();
            }
          } catch (error) {
            status.textContent = "Microphone blocked";
            console.error(error);
          }
        });
      } else {
        mic.disabled = true;
        mic.title = "Voice input is not supported in this browser";
      }
    </script>
  </body>
</html>
